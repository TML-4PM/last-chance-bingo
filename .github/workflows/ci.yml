name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: |
          if npx jest --listTests 2>/dev/null | grep -q .; then
            npm test
          else
            echo "No tests found, skipping."
          fi
      - name: Build project
        run: npm run build
      - name: Check Vercel secrets
        id: vercel_check
        env:
          VT: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -n "$VT" ]; then
            echo "has_vercel_token=true"  >> "$GITHUB_OUTPUT"
          else
            echo "has_vercel_token=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VERCEL_TOKEN not set for this repo; skipping deploy."
          fi
      - name: Deploy to Vercel
        if: steps.vercel_check.outputs.has_vercel_token == 'true'
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: .
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
